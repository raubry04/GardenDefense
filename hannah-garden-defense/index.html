<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <meta name="mobile-web-app-capable" content="yes" />

  <meta name="theme-color" content="#5A9A38" />

  <meta name="format-detection" content="telephone=no" />

  <title>Hannah's Garden Defense</title>

  <style>

    @font-face {

      font-family: 'Kenney Pixel';

      src: url('/game-assets/fonts/Kenney Pixel.ttf') format('truetype');

    }

    @font-face {

      font-family: 'Kenney Future';

      src: url('/game-assets/fonts/Kenney Future.ttf') format('truetype');

    }



    :root {

      --sat: env(safe-area-inset-top, 0px);

      --sal: env(safe-area-inset-left, 0px);

      --sar: env(safe-area-inset-right, 0px);

      --sab: env(safe-area-inset-bottom, 0px);

    }



    *, *::before, *::after {

      margin: 0;

      padding: 0;

      box-sizing: border-box;

    }



    html {

      width: 100%;

      height: 100%;

      height: 100dvh;

      height: -webkit-fill-available;

      overflow: hidden;

      background: #5A9A38;

    }



    body {

      position: fixed;

      inset: 0;

      width: 100%;

      height: 100%;

      height: 100dvh;

      height: -webkit-fill-available;

      overflow: hidden;

      background: #5A9A38;

      touch-action: none;

      -webkit-touch-callout: none;

      -webkit-user-select: none;

      user-select: none;

      overscroll-behavior: none;

      font-family: 'Kenney Future', sans-serif;

    }



    /* Dimensions + position are set from JS via visualViewport (iOS Safari). */

    #game-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      background: #5A9A38;
      /* Keep canvas above iOS home indicator / Android gesture bar */
      padding-bottom: env(safe-area-inset-bottom, 0px);
      box-sizing: border-box;
    }



    #game-container canvas {

      display: block;

      width: 100%;

      height: 100%;

      touch-action: none;

    }

  </style>

</head>

<body>

  <div id="game-container"></div>

  <script type="module" src="./src/main.js"></script>

</body>

</html>
